name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv venv --python 3.11

      - name: Install
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: .venv/bin/pytest -v
